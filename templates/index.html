<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>check-rate</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="navbar cr-navbar sticky-top" aria-label="Primary">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="/">
      <span class="brand-icon"><i class="bi bi-bar-chart-fill"></i></span>
      check-rate
      <span class="badge badge-version ms-1">v1</span>
    </a>
    <div class="d-flex align-items-center gap-2 text-muted small">
      <i class="bi bi-cloud-arrow-down"></i>
      <span>MOSO ↔ lender portal pricing diff</span>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 py-3">
  <div class="row g-3">

    <!-- ===== LEFT: scenario form + progress ===== -->
    <div class="col-lg-4 col-xl-3">
      <div class="cr-card">
        <div class="cr-card-header">
          <p class="title"><i class="bi bi-sliders me-1"></i>Scenario</p>
        </div>
        <div class="cr-card-body">
          <form id="scenario-form" autocomplete="off" novalidate>

            <div class="section">
              <p class="section-title">Lender</p>
              <select class="form-select" id="lender" name="lender" aria-label="Lender">
                <option value="ad_mortgage">AD Mortgage</option>
              </select>
            </div>

            <div class="section">
              <p class="section-title">Loan</p>
              <div class="row g-2">
                <div class="col-12">
                  <label for="loan_amount" class="form-label">Loan amount</label>
                  <div class="input-group input-group-sm">
                    <span class="input-group-text">$</span>
                    <input id="loan_amount" type="number" name="loan_amount" class="form-control" value="400000" required>
                  </div>
                </div>
                <div class="col-12">
                  <label for="property_value" class="form-label">Property value</label>
                  <div class="input-group input-group-sm">
                    <span class="input-group-text">$</span>
                    <input id="property_value" type="number" name="property_value" class="form-control" value="500000" required>
                  </div>
                </div>
                <div class="col-6">
                  <label for="ltv" class="form-label">LTV</label>
                  <div class="input-group input-group-sm">
                    <input id="ltv" type="number" step="0.01" name="ltv" class="form-control" value="80" required>
                    <span class="input-group-text">%</span>
                  </div>
                </div>
                <div class="col-6">
                  <label for="credit_score" class="form-label">FICO</label>
                  <input id="credit_score" type="number" name="credit_score" class="form-control form-control-sm" value="740" required>
                </div>
                <div class="col-12">
                  <label for="target_rate" class="form-label">Target rate</label>
                  <div class="input-group input-group-sm">
                    <input id="target_rate" type="number" step="0.001" name="target_rate" class="form-control" value="6.875" required>
                    <span class="input-group-text">%</span>
                  </div>
                  <div class="form-text">Try <span class="cr-kbd">6.875</span> · <span class="cr-kbd">6.625</span> · <span class="cr-kbd">6.490</span></div>
                </div>
                <div class="col-12">
                  <label for="loan_program" class="form-label">Program</label>
                  <input id="loan_program" type="text" name="loan_program" class="form-control form-control-sm" value="30yr Fixed Conv">
                </div>
              </div>
            </div>

            <div class="section">
              <p class="section-title">Property &amp; purpose</p>
              <div class="row g-2">
                <div class="col-12">
                  <label for="occupancy" class="form-label">Occupancy</label>
                  <select id="occupancy" name="occupancy" class="form-select form-select-sm">
                    <option value="primary_residence">Primary</option>
                    <option value="second_home">Second home</option>
                    <option value="investment">Investment</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="property_type" class="form-label">Property type</label>
                  <select id="property_type" name="property_type" class="form-select form-select-sm">
                    <option value="single_family">Single family</option>
                    <option value="condo">Condo</option>
                    <option value="pud">PUD</option>
                    <option value="2_to_4_unit">2-4 unit</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="purpose" class="form-label">Purpose</label>
                  <select id="purpose" name="purpose" class="form-select form-select-sm">
                    <option value="purchase">Purchase</option>
                    <option value="refinance">Refinance</option>
                    <option value="cashout">Cash-out</option>
                  </select>
                </div>
                <input type="hidden" name="loan_type" value="conventional">
              </div>
            </div>

            <button id="compare-btn" class="btn btn-primary w-100 mt-3" type="button" onclick="startCompare()">
              <i class="bi bi-arrow-left-right me-1"></i>
              <span class="btn-label">Compare prices</span>
            </button>
          </form>
        </div>
      </div>

      <!-- Progress card (appears during run) -->
      <div class="cr-card mt-3" id="progress-card" hidden>
        <div class="cr-card-header">
          <p class="title"><i class="bi bi-activity me-1"></i>Live progress</p>
        </div>
        <div class="cr-card-body p-3">
          <div class="cr-stepper" id="progress-stepper"></div>
        </div>
      </div>
    </div>

    <!-- ===== RIGHT: result panel ===== -->
    <div class="col-lg-8 col-xl-9">
      <div class="cr-sticky-results">
        <div class="cr-card" id="result-card">
          <div class="cr-card-header">
            <p class="title" id="result-card-title"><i class="bi bi-clipboard-data me-1"></i>Result</p>
            <span class="text-muted small" id="result-card-meta"></span>
          </div>
          <div id="result-body">
            <div class="cr-empty">
              <div class="empty-icon"><i class="bi bi-bar-chart-line"></i></div>
              <div class="empty-title">No comparison yet</div>
              <div class="empty-sub">Fill in the scenario and click <strong>Compare prices</strong> to diff MOSO vs the lender portal.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ===== MFA Modal ===== -->
<div class="modal fade" id="mfaModal" tabindex="-1" aria-labelledby="mfaModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="mfaModalLabel"><i class="bi bi-shield-lock me-1"></i>MFA required</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-3">Enter the MFA code from <strong id="mfa-lender">the lender</strong>:</p>
        <input id="mfa-code" type="text" class="form-control font-mono" autocomplete="one-time-code" inputmode="numeric" placeholder="123456" aria-label="MFA code">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitMfa()">Submit code</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS bundle (for modal) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ============== Constants ==============
const STEPS = [
  ['moso_pricing',  'MOSO pricing',     'bi-cloud-arrow-down'],
  ['portal_login',  'Portal login',     'bi-box-arrow-in-right'],
  ['portal_quote',  'Portal quote',     'bi-keyboard'],
  ['portal_parse',  'Parse result',     'bi-clipboard-check'],
];
const STEP_ICONS = { pending: '·', started: '◐', ok: '✓', failed: '✕' };

let currentSession = null;
let mfaModalInstance = null;
document.addEventListener('DOMContentLoaded', () => {
  mfaModalInstance = new bootstrap.Modal(document.getElementById('mfaModal'));
});

// ============== Helpers ==============
function fmt(v, digits = 3, suffix = '') {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (Number.isNaN(n)) return String(v);
  return n.toFixed(digits) + suffix;
}
function signedFmt(v, digits = 3, suffix = '') {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (Number.isNaN(n)) return String(v);
  const s = n.toFixed(digits);
  return (n > 0 ? '+' + s : s) + suffix;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function norm(s) { return String(s || '').toLowerCase().trim().replace(/\s+/g, ' '); }
function mapByLabel(adjs) {
  const out = {};
  for (const a of adjs) out[norm(a.label)] = Number(a.amount);
  return out;
}
function setResult(html) { document.getElementById('result-body').innerHTML = html; }
function setResultMeta(text) { document.getElementById('result-card-meta').textContent = text; }

// ============== Progress stepper ==============
function renderProgress(state) {
  const host = document.getElementById('progress-stepper');
  host.innerHTML = '';
  for (const [key, label, icon] of STEPS) {
    const status = state[key] || 'pending';
    const div = document.createElement('div');
    div.className = 'cr-step ' + status;
    div.innerHTML = `
      <span class="step-icon">${STEP_ICONS[status]}</span>
      <span class="step-label">
        <i class="bi ${icon} me-1 small"></i>${escapeHtml(label)}
      </span>
    `;
    host.appendChild(div);
  }
}

// ============== Render report ==============
function renderReport(report) {
  setResultMeta(`${report.lender} · ${report.scenario.target_rate}%`);

  const verdictCls = report.matches ? 'match' : 'mismatch';
  const verdictTitle = report.matches ? 'Prices match' : 'Prices do not match';
  const verdictIcon = report.matches ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill';

  const mosoBase = Number(report.moso.base_price);
  const mosoFinal = Number(report.moso.final_price);
  const portalFinal = report.portal.final_price !== null ? Number(report.portal.final_price) : null;
  const delta = portalFinal !== null ? portalFinal - mosoFinal : null;

  const mismatchFields = new Set(report.mismatches.map(m => m.field));

  // ----- Banner -----
  const banner = `
    <div class="cr-verdict ${verdictCls}">
      <div class="cr-verdict-left">
        <div class="cr-verdict-icon"><i class="bi ${verdictIcon}"></i></div>
        <div>
          <h2 class="cr-verdict-title">${verdictTitle}</h2>
          <div class="cr-verdict-sub">
            ${report.matches
              ? 'MOSO and the lender portal agree on rate-sheet pricing.'
              : `Pricing difference detected at note rate ${report.scenario.target_rate}%.`}
          </div>
        </div>
      </div>
      <div class="cr-verdict-meta">
        <div><strong>Δ ${delta === null ? '—' : signedFmt(delta) + '%'}</strong></div>
        <div>report <code>${escapeHtml(report.id)}</code></div>
      </div>
    </div>
  `;

  // ----- Metrics -----
  const portalCls = portalFinal === null
    ? 'muted'
    : (report.matches ? 'match' : 'mismatch');
  const deltaCls = delta === null
    ? 'muted'
    : (Math.abs(delta) < 0.0005 ? 'match' : 'mismatch');

  const metrics = `
    <div class="cr-metrics">
      <div class="cr-metric">
        <div class="label">Note rate</div>
        <div class="value">${fmt(report.scenario.target_rate, 3)}%</div>
        <div class="sub">${escapeHtml(report.scenario.loan_program)}</div>
      </div>
      <div class="cr-metric">
        <div class="label">MOSO Lender Credits</div>
        <div class="value ${portalCls}">${fmt(mosoFinal, 3)}%</div>
        <div class="sub">Adjusted Price after MOSO adjustments</div>
      </div>
      <div class="cr-metric">
        <div class="label">${escapeHtml(report.lender)} Final Price</div>
        <div class="value ${portalCls}">${portalFinal === null ? '—' : fmt(portalFinal, 3) + '%'}</div>
        <div class="sub">live from Quick Pricer Pro</div>
      </div>
      <div class="cr-metric">
        <div class="label">Delta</div>
        <div class="value ${deltaCls}">${delta === null ? '—' : signedFmt(delta, 3) + '%'}</div>
        <div class="sub">portal − MOSO Lender Credits</div>
      </div>
    </div>
  `;

  // ----- Rate-sheet price table: MOSO breakdown + the actual comparison row -----
  const adjTotal = Number(report.moso.adjustment_total);
  let priceTable = `
    <div class="cr-section-label">Pricing breakdown <span class="hint">— how MOSO derives Lender Credits from the base rate sheet</span></div>
    <div class="table-responsive">
      <table class="table cr-compare mb-0" aria-label="Pricing breakdown">
        <thead>
          <tr>
            <th style="width: 35%;">Field</th>
            <th class="text-end">MOSO</th>
            <th class="text-end">${escapeHtml(report.lender)} portal</th>
            <th class="text-end" style="width: 18%;">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr class="info">
            <td><span class="field">Base Price</span><span class="field-hint">Pre-adjustment lender rate-sheet price</span></td>
            <td class="num">${fmt(mosoBase)}%</td>
            <td class="num empty">—</td>
            <td class="text-end"><span class="cr-badge info">info</span></td>
          </tr>
          <tr class="info">
            <td><span class="field">+ Total Adjustments</span><span class="field-hint">Sum of LLPAs + broker comp + costs (broken out below)</span></td>
            <td class="num">${signedFmt(adjTotal)}</td>
            <td class="num empty">—</td>
            <td class="text-end"><span class="cr-badge info">moso-only</span></td>
          </tr>
          <tr class="${mismatchFields.has('final_price') ? 'mismatch' : 'match'}">
            <td><span class="field">= Lender Credits / Lender Points</span><span class="field-hint">Adjusted Price — broker's net (what's compared)</span></td>
            <td class="num">${fmt(mosoFinal)}%</td>
            <td class="num">${portalFinal === null ? '—' : fmt(portalFinal) + '%'}</td>
            <td class="text-end">${
              mismatchFields.has('final_price')
                ? `<span class="cr-badge mismatch">Δ ${signedFmt(delta)}</span>`
                : '<span class="cr-badge match">match</span>'
            }</td>
          </tr>
        </tbody>
      </table>
    </div>
  `;

  // ----- Itemized adjustments -----
  const mosoMap = mapByLabel(report.moso.adjustments || []);
  const portalMap = mapByLabel(report.portal.adjustments || []);
  const labels = Array.from(new Set([...Object.keys(mosoMap), ...Object.keys(portalMap)])).sort();

  let adjSection;
  if (labels.length === 0) {
    adjSection = `
      <div class="cr-note">
        <strong>Itemized LLPAs</strong> — not exposed in this view.
        MOSO's <code>commission_detail</code> contains only roll-ups for AD Mortgage, and v1 portal scraping reads
        only the final price column. v1.5 will click the rate cell to open the LLPA dropdown and itemize them.
      </div>
    `;
  } else {
    let rows = '';
    for (const label of labels) {
      const m = mosoMap[label];
      const p = portalMap[label];
      const field = 'adjustment:' + label;
      const isMm = mismatchFields.has(field);
      const cls = isMm ? 'mismatch' : 'match';
      let badge;
      if (m === undefined) badge = '<span class="cr-badge portal-only">portal only</span>';
      else if (p === undefined) badge = '<span class="cr-badge moso-only">MOSO only</span>';
      else if (isMm) badge = `<span class="cr-badge mismatch">Δ ${signedFmt(p - m)}</span>`;
      else badge = '<span class="cr-badge match">match</span>';
      rows += `
        <tr class="${cls}">
          <td><span class="field">${escapeHtml(label)}</span></td>
          <td class="num ${m === undefined ? 'empty' : ''}">${m === undefined ? '—' : fmt(m)}</td>
          <td class="num ${p === undefined ? 'empty' : ''}">${p === undefined ? '—' : fmt(p)}</td>
          <td class="text-end">${badge}</td>
        </tr>
      `;
    }
    adjSection = `
      <div class="cr-section-label">Itemized adjustments</div>
      <div class="table-responsive">
        <table class="table cr-compare mb-0">
          <thead>
            <tr>
              <th>Label</th>
              <th class="text-end">MOSO</th>
              <th class="text-end">Portal</th>
              <th class="text-end" style="width: 18%;">Status</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  setResult(banner + metrics + priceTable + adjSection);
}

// ============== Render error ==============
function renderError(step, message) {
  setResultMeta('error');
  const html = `
    <div class="cr-verdict error">
      <div class="cr-verdict-left">
        <div class="cr-verdict-icon"><i class="bi bi-exclamation-octagon-fill"></i></div>
        <div>
          <h2 class="cr-verdict-title">Comparison failed</h2>
          <div class="cr-verdict-sub">Step <code>${escapeHtml(step || 'unknown')}</code> reported an error.</div>
        </div>
      </div>
      <div class="cr-verdict-meta">
        <div>Check the message below</div>
      </div>
    </div>
    <pre class="cr-error-detail">${escapeHtml(message)}</pre>
    <div class="cr-note">
      <strong>Common causes:</strong> MOSO session expired (refresh <code>data/moso-headers.json</code>);
      portal selectors changed (re-run <code>playwright codegen</code>);
      rate not in the lender's ladder.
    </div>
  `;
  setResult(html);
}

// ============== Compare flow ==============
async function startCompare() {
  const form = document.getElementById('scenario-form');
  const data = Object.fromEntries(new FormData(form));
  const payload = {
    lender: data.lender,
    scenario: {
      loan_amount:    Number(data.loan_amount),
      credit_score:   Number(data.credit_score),
      property_value: Number(data.property_value),
      ltv:            Number(data.ltv),
      occupancy:      data.occupancy,
      property_type:  data.property_type,
      purpose:        data.purpose,
      loan_program:   data.loan_program,
      loan_type:      data.loan_type,
      target_rate:    Number(data.target_rate),
    },
  };

  const btn = document.getElementById('compare-btn');
  btn.disabled = true;
  btn.querySelector('.btn-label').textContent = 'Running…';

  document.getElementById('progress-card').hidden = false;
  const state = Object.fromEntries(STEPS.map(([k]) => [k, 'pending']));
  renderProgress(state);

  setResultMeta('running…');
  setResult(`
    <div class="cr-empty">
      <div class="empty-icon"><i class="bi bi-arrow-repeat" style="animation: spin 1.5s linear infinite; display: inline-block;"></i></div>
      <div class="empty-title">Comparing MOSO ↔ ${escapeHtml(payload.lender)}…</div>
      <div class="empty-sub">A headed Chromium window will drive the portal in real time.</div>
    </div>
    <style>@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }</style>
  `);

  let r;
  try {
    r = await fetch('/compare', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
  } catch (e) {
    renderError('compare', 'POST /compare failed: ' + e);
    resetButton();
    return;
  }
  if (!r.ok) {
    renderError('compare', 'POST /compare returned HTTP ' + r.status);
    resetButton();
    return;
  }
  currentSession = (await r.json()).session_id;
  const es = new EventSource('/events/stream?session_id=' + currentSession);

  es.addEventListener('progress', ev => {
    const d = JSON.parse(ev.data);
    state[d.step] = d.status;
    renderProgress(state);
  });

  es.addEventListener('mfa_required', ev => {
    const d = JSON.parse(ev.data);
    document.getElementById('mfa-lender').textContent = d.lender;
    mfaModalInstance.show();
    setTimeout(() => document.getElementById('mfa-code').focus(), 200);
  });

  es.addEventListener('error', ev => {
    try {
      const d = JSON.parse(ev.data);
      if (state[d.step]) state[d.step] = 'failed';
      renderProgress(state);
      renderError(d.step, d.message);
    } catch (_) {
      renderError('stream', String(ev.data || 'event stream error'));
    }
    resetButton();
    es.close();
  });

  es.addEventListener('done', async ev => {
    const d = JSON.parse(ev.data);
    try {
      const rr = await fetch('/report/' + d.report_id);
      if (!rr.ok) throw new Error('GET /report HTTP ' + rr.status);
      const report = await rr.json();
      renderReport(report);
    } catch (e) {
      renderError('report', 'Could not fetch report: ' + e);
    }
    resetButton();
    es.close();
  });
}

function resetButton() {
  const btn = document.getElementById('compare-btn');
  btn.disabled = false;
  btn.querySelector('.btn-label').textContent = 'Compare prices';
}

async function submitMfa() {
  const code = document.getElementById('mfa-code').value.trim();
  if (!code) return;
  await fetch('/mfa/' + currentSession + '/code', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({code}),
  });
  mfaModalInstance.hide();
  document.getElementById('mfa-code').value = '';
}

// Enter-to-submit MFA
document.addEventListener('keypress', e => {
  if (e.key === 'Enter' && document.getElementById('mfaModal').classList.contains('show')) {
    e.preventDefault();
    submitMfa();
  }
});
</script>
</body>
</html>
